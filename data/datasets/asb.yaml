schema_version: 1
dataset_id: asb
display_name: ASB controlled local dataset
status: optional_local_private
public_safe: false
adapter: asb
local_path_env: CANARYWEAVE_ASB_ROOT
absent_behavior: skipped_missing_local_path
summary: >-
  Adapter contract for ASB-derived cases. Raw records remain in controlled local
  custody and are never committed or emitted in public artifacts.

source_custody:
  raw_payloads_in_repo: false
  raw_to_case_manifest_public: false
  committed_payload_fields: none
  public_export_policy: redacted_features_only

splits:
  dev:
    description: Private tuning split; public exports contain aggregate metrics only.
  test:
    description: Frozen private evaluation split; no tuning after inspection.
  holdout:
    description: Optional final confirmation split.

case_contract:
  id_style: opaque_non_reconstructable
  raw_ref_visibility: private_only
  includes_raw_payload: false
  emitted_public_fields:
    - case_id
    - dataset_id
    - split
    - case_kind
    - attack_category
    - surface
    - safe_features
    - policy_context
    - expected_behavior
  withheld_fields:
    - raw_prompt
    - raw_completion
    - raw_tool_output
    - raw_trace
    - raw_ref
    - judge_transcript

category_mapping_notes:
  - Map dataset-native labels into shared taxonomy without copying payload text.
  - Prefer structural policy categories over dataset-specific signature labels.
