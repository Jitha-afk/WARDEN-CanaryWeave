schema_version: 1
ruleset_id: canaryweave_rules
version: 0.2.0
purpose: >-
  Manifest for the defender-maintainable WARDEN policy rules used by the
  pre-context gate. Current executable rules live under the top-level rules/
  directory in .war YAML format.

safety:
  no_raw_payload_signatures: true
  no_dataset_specific_payload_strings: true
  public_fixtures_synthetic_only: true
  inspect_structured_policy_facts: true

rule_sources:
  - path: rules/mcp_agentic_misuse/server_sampling_origin_boundary.war
    policy_shape: untrusted_origin_requests_ungranted_capability
    transferable: true
  - path: rules/mcp_agentic_misuse/canary_boundary_crossing.war
    policy_shape: canary_data_flows_to_unapproved_sink
    transferable: true
  - path: rules/mcp_prompt_boundary/untrusted_instruction_shape.war
    policy_shape: untrusted_content_has_instruction_shape
    transferable: true
  - path: rules/mcp_suspicious_structure/hidden_unicode_structure.war
    policy_shape: hidden_structure_in_untrusted_content
    transferable: true
  - path: rules/mcp_data_flow/credential_or_secret_exposure.war
    policy_shape: credential_or_secret_exposure
    transferable: true
  - path: rules/mcp_resource_boundary/path_or_uri_boundary_escape.war
    policy_shape: path_or_uri_boundary_escape
    transferable: true
  - path: rules/mcp_execution/command_or_code_execution_request.war
    policy_shape: untrusted_code_or_command_request
    transferable: true
  - path: rules/mcp_network/unapproved_network_request.war
    policy_shape: unapproved_network_or_api_request
    transferable: true
  - path: rules/mcp_prompt_boundary/protected_context_extraction.war
    policy_shape: protected_prompt_policy_or_schema_extraction
    transferable: true
  - path: rules/mcp_impact/destructive_action_intent.war
    policy_shape: unauthorized_destructive_agent_action
    transferable: true
  - path: rules/mcp_abuse/deceptive_social_engineering_tasking.war
    policy_shape: deceptive_social_engineering_or_recon_tasking
    transferable: true

required_rule_metadata:
  - id
  - name
  - version
  - category
  - severity
  - scope
  - description
  - signals
  - condition
  - recommended_action
  - fixtures
  - safety_notes

reason_code_mapping:
  server_sampling_origin_boundary: untrusted_origin_policy_override
  canary_boundary_crossing: canary_boundary_violation
  untrusted_instruction_shape: untrusted_instruction_shape
  hidden_unicode_structure: hidden_structure_present
  credential_or_secret_exposure: credential_or_secret_exposure
  path_or_uri_boundary_escape: resource_boundary_escape
  command_or_code_execution_request: untrusted_execution_request
  unapproved_network_request: unapproved_network_request
  protected_context_extraction: protected_context_exfiltration
  destructive_action_intent: destructive_agent_action
  deceptive_social_engineering_tasking: deceptive_social_engineering_tasking
